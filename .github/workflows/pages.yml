# Deploys this repo's static assets to GitHub Pages via Actions.
# Replaces the legacy Pages builder, whose internal ref froze on a force-pushed-away
# commit (3c70bcc) in June 2026 and never built again (found 2026-07-20 — new pushes
# silently didn't deploy; the June build kept serving).
name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
